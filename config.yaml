market:
  token_id: ""
  polling_interval_seconds: 10
  network: "polygon-mainnet"
discovery:
  enabled: true
  query: "Bitcoin Up or Down"
  coin_slug_prefix: "btc-"
  limit: 50
  gamma_api: "https://gamma-api.polymarket.com"
strategy:
  name: "Агрессивный бот"
  timeframe: "1m"
  parameters:
    fast_ema: 3
    slow_ema: 15
    signal_smoothing: 3
  indicators:
    - name: "MACD"
      source: "pandas_ta"
    - name: "PriceSource"
      api: "Binance-REST"
  rsi:
    period: 14
    overbought: 65
    oversold: 35
  order_book:
    imbalance_threshold: 0.60
    depth_levels: 5
risk_management:
  initial_balance_usd: 1000.0
  position_size_pct: 0.05
  stop_loss_pct: 0.07
  take_profit_pct: 0.10
  max_daily_loss_pct: 0.50
  min_time_before_expiry_sec: 90
  max_time_before_expiry_sec: 360
  use_sl_tp: false
  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 5.0
  atr_tp_multiplier: 10.0
  trailing_stop_enabled: false
  trailing_stop_atr_multiplier: 3.0
simulation:
  state_file: "state_aggress.json"
  log_file: "trades_aggress.csv"
  slippage_simulation_pct: 0.001
  fee_simulation_pct: 0.000
  market_impact_factor: 0.002
  partial_fill_min_pct: 0.85
