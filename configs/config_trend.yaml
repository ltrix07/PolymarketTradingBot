# ============================================================
# TREND RIDER — Ride Momentum, Lock Profits
# ============================================================
# Philosophy: Only enter clear directional moves confirmed by
# strong order book imbalance. Then let the position run with
# a wide TP target and an aggressive trailing stop that locks
# profits as price moves in our favor. Price filter (0.35-0.65)
# avoids extreme odds markets.
# Expected: 3-6 trades/day, ~50-54% win rate,
#   but winners are larger due to wide TP + trailing stop.
#
# CHANGES from previous version:
#   - trend_ema_period: 60 -> 30  (1h trend still too strict)
#   - imbalance_threshold: 0.58 -> 0.54  (0.58 required very rare book state)
#   - min_time_before_expiry_sec: 90 -> 60  (wider entry window)
#   - max_time_before_expiry_sec: 350 -> 480
# ============================================================

market:
  token_id: ""
  polling_interval_seconds: 10
  network: "polygon-mainnet"

discovery:
  enabled: true
  query: "Bitcoin Up or Down"
  coin_slug_prefix: "btc-"
  limit: 50
  gamma_api: "https://gamma-api.polymarket.com"

strategy:
  name: "TrendRider"
  timeframe: "1m"
  parameters:
    fast_ema: 8
    slow_ema: 20
    signal_smoothing: 5
  indicators:
    - name: "MACD"
      source: "pandas_ta"
    - name: "PriceSource"
      api: "Binance-REST"
  rsi:
    period: 14
    overbought: 72          # Relaxed — allow riding strong trends
    oversold: 28
  order_book:
    imbalance_threshold: 0.54   # Relaxed from 0.58 — still meaningful but triggerable
    depth_levels: 5
  entry_filters:
    trend_ema_period: 30         # 30m trend filter (was 60 — too strict for 5-min markets)
    min_token_price: 0.35        # Avoid extreme lows (likely resolved)
    max_token_price: 0.65        # Avoid extreme highs (poor R:R)

risk_management:
  initial_balance_usd: 1000.0
  position_size_pct: 0.05       # Standard 5%
  max_daily_loss_pct: 0.10
  min_time_before_expiry_sec: 60      # Wider entry window (was 90)
  max_time_before_expiry_sec: 480     # Wider entry window (was 350)

  use_sl_tp: true
  use_hard_tp: true
  use_hard_sl: true

  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 3.0        # SL beyond market noise
  atr_tp_multiplier: 4.5        # TP = 1.5x SL distance

  sl_confirm_seconds: 12        # Wait 12s to confirm SL breach is real, not a spike
  cooldown_after_sl_sec: 45

  trailing_stop_enabled: true
  trailing_stop_atr_multiplier: 1.5

trading:
  use_ws: true
  use_binance_ws: true
  binance_ws_candle_history: 300
  signal_confirmation_ticks: 2

simulation:
  state_file: "state_trend.json"
  log_file: "trades_trend.csv"
  slippage_simulation_pct: 0.001
  fee_simulation_pct: 0.000
  market_impact_factor: 0.002
  liquidity_fallback_usd: 1000.0
  partial_fill_min_pct: 0.85

endpoints:
  polymarket_clob: "https://clob.polymarket.com"
  binance_v3: "https://api.binance.com/api/v3"
  telegram_bot_token: ""
  telegram_chat_id: ""
