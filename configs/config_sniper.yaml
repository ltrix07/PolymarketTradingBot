# ============================================================
# SNIPER — High Conviction, Selective Entries
# ============================================================
# Philosophy: Fewer trades, but each one is high-probability.
# Only enters when the market is genuinely uncertain (price
# near 0.50) AND there's a volume spike on Binance confirming
# real institutional/retail activity.
# Larger position size (8%) because each signal is filtered.
# Expected: 2-5 trades/day, ~55-60% win rate,
#   fewer opportunities but better expected value per trade.
#
# CHANGES from previous version:
#   - trend_ema_period: 120 -> 50  (2h trend too strict for 5-min markets)
#   - volume_spike_multiplier: 1.3 -> 1.15  (easier to trigger)
#   - min_time_before_expiry_sec: 120 -> 60  (wider entry window)
#   - max_time_before_expiry_sec: 400 -> 480
# ============================================================

market:
  token_id: ""
  polling_interval_seconds: 10
  network: "polygon-mainnet"

discovery:
  enabled: true
  query: "Bitcoin Up or Down"
  coin_slug_prefix: "btc-"
  limit: 50
  gamma_api: "https://gamma-api.polymarket.com"

strategy:
  name: "Sniper"
  timeframe: "1m"
  parameters:
    fast_ema: 10
    slow_ema: 26
    signal_smoothing: 8
  indicators:
    - name: "MACD"
      source: "pandas_ta"
    - name: "PriceSource"
      api: "Binance-REST"
  rsi:
    period: 14
    overbought: 65
    oversold: 35
  order_book:
    imbalance_threshold: 0.56
    depth_levels: 5
  entry_filters:
    trend_ema_period: 50             # Only trade in direction of EMA50 trend (was 120 — too strict)
    market_uncertainty_band: 0.15    # Only enter when price is 0.35-0.65 (genuine uncertainty)
    require_volume_spike: true       # Require Binance volume confirmation
    volume_spike_multiplier: 1.15    # Last candle vol > 1.15x average (relaxed from 1.3)
    volume_spike_period: 8           # Average over 8 candles

risk_management:
  initial_balance_usd: 1000.0
  position_size_pct: 0.08       # Larger bets — 8% per high-conviction trade
  max_daily_loss_pct: 0.08      # Tighter 8% daily limit (fewer trades to recover)
  min_time_before_expiry_sec: 60      # Wider entry window (was 120)
  max_time_before_expiry_sec: 480     # Wider entry window (was 400)

  use_sl_tp: true
  use_hard_tp: true
  use_hard_sl: true

  use_atr_dynamic: true
  atr_period: 14
  atr_sl_multiplier: 3.0        # SL beyond market noise
  atr_tp_multiplier: 4.5        # TP = 1.5x SL distance

  sl_confirm_seconds: 15        # Wait 15s to confirm SL breach is real, not a spike
  cooldown_after_sl_sec: 60     # Patient re-entry after loss

  trailing_stop_enabled: true
  trailing_stop_atr_multiplier: 1.5

trading:
  use_ws: true
  use_binance_ws: true
  binance_ws_candle_history: 300
  signal_confirmation_ticks: 2

simulation:
  state_file: "state_sniper.json"
  log_file: "trades_sniper.csv"
  slippage_simulation_pct: 0.001
  fee_simulation_pct: 0.000
  market_impact_factor: 0.002
  liquidity_fallback_usd: 1000.0
  partial_fill_min_pct: 0.85
  # ── Pessimization: realistic Polygon/CLOB simulation ──
  adverse_selection_penalty_pct: 0.75
  tx_drop_rate_pct: 0.10
  latency_min_sec: 1.5
  latency_max_sec: 4.0

endpoints:
  polymarket_clob: "https://clob.polymarket.com"
  binance_v3: "https://api.binance.com/api/v3"
  telegram_bot_token: ""
  telegram_chat_id: ""
